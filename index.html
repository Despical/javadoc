<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Despical Javadocs</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7f7f4;
      color: #1d2329;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
    }

    main {
      width: min(760px, calc(100vw - 40px));
      padding: 56px 0;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 5vw, 4rem);
      line-height: 1;
    }

    p {
      margin: 0 0 32px;
      color: #5a6470;
      font-size: 1rem;
    }

    ul {
      display: grid;
      gap: 12px;
      padding: 0;
      margin: 0;
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      border: 1px solid #d7d9d6;
      border-radius: 8px;
      padding: 16px 18px;
      background: #ffffff;
    }

    a {
      color: #075f8f;
      font-size: 1.08rem;
      font-weight: 700;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .project-links {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 0 0 auto;
    }

    .icon-link {
      display: inline-grid;
      width: 36px;
      height: 36px;
      place-items: center;
      border: 1px solid #d7d9d6;
      border-radius: 8px;
      color: #1d2329;
      background: #f8fafb;
    }

    .icon-link:hover {
      border-color: #8fcfff;
      background: #eef8ff;
      text-decoration: none;
    }

    .icon-link img {
      display: block;
    }

    footer {
      margin-top: 28px;
      color: #68727d;
      font-size: 0.85rem;
    }

    @media (max-width: 520px) {
      li {
        align-items: flex-start;
        flex-direction: column;
      }

      .project-links {
        align-self: stretch;
      }
    }

    @media (prefers-color-scheme: dark) {
      :root {
        background: #151719;
        color: #f4f0e8;
      }

      p,
      footer {
        color: #aeb6bf;
      }

      li {
        background: #20252a;
        border-color: #39414a;
      }

      a {
        color: #7cc7ff;
      }

      .icon-link {
        border-color: #39414a;
        color: #f4f0e8;
        background: #171b1f;
      }

      .icon-link:hover {
        border-color: #5faee8;
        background: #1b2831;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Despical's Javadocs</h1>
    <p>Generated API documentation for open source Despical projects.</p>
    <ul>
      <li>
        <a href="./tnt-run/">TNTRun</a>
        <div class="project-links">
          <a class="icon-link" href="https://github.com/Despical/TNTRun" aria-label="TNTRun on GitHub" title="GitHub">
            <img src="./assets/icons/github.svg" alt="" width="20" height="20">
          </a>
          <a class="icon-link" href="https://www.spigotmc.org/resources/tnt-run-1-9-1-21-5.83196/" aria-label="TNTRun on SpigotMC" title="SpigotMC">
            <img src="./assets/icons/spigot.svg" alt="" width="20" height="20">
          </a>
        </div>
      </li>
      <li>
        <a href="./command-framework/">CommandFramework</a>
        <div class="project-links">
          <a class="icon-link" href="https://github.com/Despical/CommandFramework" aria-label="CommandFramework on GitHub" title="GitHub">
            <img src="./assets/icons/github.svg" alt="" width="20" height="20">
          </a>
          <a class="icon-link" href="https://www.spigotmc.org/resources/command-framework-1-7-26-2.89933/" aria-label="CommandFramework on SpigotMC" title="SpigotMC">
            <img src="./assets/icons/spigot.svg" alt="" width="20" height="20">
          </a>
        </div>
      </li>
    </ul>
    <footer>Last synced: Jul 6, 2026, 10:51</footer>
  </main>
</body>
</html>
