<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Despical Javadocs</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7f7f4;
      color: #1d2329;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
    }

    main {
      width: min(760px, calc(100vw - 40px));
      padding: 56px 0;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 5vw, 4rem);
      line-height: 1;
    }

    p {
      margin: 0 0 32px;
      color: #5a6470;
      font-size: 1rem;
    }

    ul {
      display: grid;
      gap: 12px;
      padding: 0;
      margin: 0;
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      border: 1px solid #d7d9d6;
      border-radius: 8px;
      padding: 16px 18px;
      background: #ffffff;
    }

    a {
      color: #075f8f;
      font-size: 1.08rem;
      font-weight: 700;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    span {
      color: #68727d;
      font-size: 0.92rem;
    }

    footer {
      margin-top: 28px;
      color: #68727d;
      font-size: 0.85rem;
    }

    @media (max-width: 520px) {
      li {
        align-items: flex-start;
        flex-direction: column;
      }
    }

    @media (prefers-color-scheme: dark) {
      :root {
        background: #151719;
        color: #f4f0e8;
      }

      p,
      span,
      footer {
        color: #aeb6bf;
      }

      li {
        background: #20252a;
        border-color: #39414a;
      }

      a {
        color: #7cc7ff;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Despical Javadocs</h1>
    <p>Generated API documentation for open source Despical projects.</p>
    <ul>
      <li>
        <a href="./TNTRun/">TNTRun</a>
        <span>TNTRun</span>
      </li>
      <li>
        <a href="./CommandFramework/">CommandFramework</a>
        <span>CommandFramework</span>
      </li>
    </ul>
    <footer>Last synced: 2026-07-05T12:41:09.468Z</footer>
  </main>
</body>
</html>
