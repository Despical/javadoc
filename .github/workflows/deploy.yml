name: Deploy Javadocs

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: write

concurrency:
  group: javadocs
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Sync Javadocs
        run: node scripts/sync-javadocs.mjs

      - name: Publish generated files to branch root
        run: |
          cp -R public/TNTRun public/CommandFramework .
          cp public/index.html public/.nojekyll public/CNAME .

      - name: Commit generated Javadocs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .nojekyll CNAME TNTRun CommandFramework
          if git diff --cached --quiet; then
            echo "No Javadoc changes to commit."
          else
            git commit -m "Update generated Javadocs"
            git push
          fi
