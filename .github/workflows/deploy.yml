name: Deployment

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: write

concurrency:
  group: javadocs
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Sync Javadocs
        run: node scripts/sync-javadocs.mjs

      - name: Publish generated files to branch root
        run: node scripts/publish-root.mjs

      - name: Commit generated Javadocs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A index.html .nojekyll CNAME favicon.svg .javadocs-manifest.json
          node -e "for (const project of require('./projects.json')) console.log(project.slug)" | xargs git add -A --
          if git diff --cached --quiet; then
            echo "No Javadoc changes to commit."
          else
            git commit -m "Update generated Javadocs"
            git push
          fi
